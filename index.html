<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUDLE</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --correct: #6aaa64;
    --present: #c9b458;
    --absent: #787c7e;
    --text: #1a1a1a;
    --border: #d3d6da;
    --key-bg: #d3d6da;
    --key-text: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }



  header {
    width: 100%;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3.2rem;
    letter-spacing: 4px;
    color: #1a1a1a;
    text-shadow: none;
    line-height: 1;
  }

  .subtitle {
    font-size: 0.7rem;
    opacity: 0.5;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 28px 16px 20px;
    width: 100%;
    max-width: 420px;
  }

  #message {
    height: 28px;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a1a1a;
    font-weight: 500;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* Grid */
  #grid {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    width: 100%;
    max-width: 330px;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .tile {
    aspect-ratio: 1;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 1px;
    color: var(--text);
    background: white;
    transition: border-color 0.1s;
    position: relative;
    overflow: hidden;
  }

  .tile.filled {
    border-color: #5a5a7a;
    animation: pop 0.1s ease;
  }

  .tile.correct {
    background: var(--correct);
    border-color: var(--correct);
    color: white;
    text-shadow: none;
  }

  .tile.present {
    background: var(--present);
    border-color: var(--present);
    color: white;
  }

  .tile.absent {
    background: var(--absent);
    border-color: var(--absent);
    color: white;
  }

  .tile.reveal {
    animation: flip 0.5s ease forwards;
  }

  .tile.shake {
    animation: shake 0.4s ease;
  }

  .tile.bounce {
    animation: bounce 0.6s ease;
  }

  @keyframes pop {
    0% { transform: scale(0.9); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes flip {
    0% { transform: rotateX(0); }
    50% { transform: rotateX(-90deg); }
    100% { transform: rotateX(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-12px); }
    60% { transform: translateY(-6px); }
  }

  /* Keyboard */
  #keyboard {
    display: flex;
    flex-direction: column;
    gap: 7px;
    width: 100%;
    max-width: 380px;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 5px;
  }

  .key {
    height: 54px;
    min-width: 36px;
    padding: 0 6px;
    border: none;
    border-radius: 4px;
    background: var(--key-bg);
    color: var(--key-text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s, color 0.2s;
    text-transform: uppercase;
    border-bottom: 3px solid rgba(0,0,0,0.3);
  }

  .key:active { transform: translateY(2px); border-bottom-width: 1px; }

  .key.wide { min-width: 58px; font-size: 0.65rem; }

  .key.correct { background: var(--correct); color: white; border-bottom-color: #4a8a44; }
  .key.present { background: var(--present); color: white; border-bottom-color: #a89438; }
  .key.absent  { background: #787c7e; color: white; border-bottom-color: #555; }

  /* Modal */
  #modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #modal.show { display: flex; }

  .modal-box {
    background: white;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 36px 40px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    animation: modalIn 0.3s ease;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  }

  .modal-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--correct);
  }

  @keyframes modalIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .modal-emoji { font-size: 3rem; margin-bottom: 12px; }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 3px;
    color: #1a1a1a;
    margin-bottom: 8px;
  }

  .modal-word {
    font-size: 1rem;
    opacity: 0.5;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .modal-answer {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 6px;
    color: var(--correct);
    margin-bottom: 24px;
  }

  .modal-btn {
    background: #1a1a1a;
    color: white;
    border: none;
    padding: 12px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 3px;
    cursor: pointer;
    border-radius: 4px;
    border-bottom: 3px solid #000;
    transition: transform 0.1s;
  }

  .modal-btn:active { transform: translateY(2px); border-bottom-width: 1px; }

  .attempts-display {
    font-size: 0.7rem;
    opacity: 0.4;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>RUDLE</h1>
  <span class="subtitle">the rude word game</span>
</header>

<main>
  <div id="message"></div>
  <div id="grid"></div>
  <div id="keyboard"></div>
</main>

<div id="modal">
  <div class="modal-box">
    <div class="modal-emoji" id="modal-emoji">🎉</div>
    <div class="modal-title" id="modal-title">YOU GOT IT</div>
    <div class="modal-word">the word was</div>
    <div class="modal-answer" id="modal-answer"></div>
    <div class="attempts-display" id="modal-attempts"></div>
    <button class="modal-btn" onclick="newGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
const WORDS = [
  'BOOBY','BURPS','FARTY','PENIS','WILLY','PUMPY','PUMPS','STINK',
  'POOPS','PISSY','QUEEF','FLAPS','POOPY','MUFFS','SEMEN','ARSES',
  'BALLS','COCKS','DICKS','FANNY','BOBOS','JIZZY','BUTTS','VULVA',
  'CUNTY','CUNTS','PUBES','CRACK','DILDO','BITCH','TWATS','PRICK','WANKS'
];

let target, currentRow, currentCol, board, gameOver, keyStates;

function newGame() {
  target = WORDS[Math.floor(Math.random() * WORDS.length)];
  currentRow = 0;
  currentCol = 0;
  board = Array.from({length:6}, () => Array(5).fill(''));
  gameOver = false;
  keyStates = {};
  document.getElementById('modal').classList.remove('show');
  setMessage('');
  buildGrid();
  buildKeyboard();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    row.id = `row-${r}`;
    for (let c = 0; c < 5; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.id = `tile-${r}-${c}`;
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

function buildKeyboard() {
  const rows = [
    ['Q','W','E','R','T','Y','U','I','O','P'],
    ['A','S','D','F','G','H','J','K','L'],
    ['ENTER','Z','X','C','V','B','N','M','⌫']
  ];
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'key' + (k === 'ENTER' || k === '⌫' ? ' wide' : '');
      btn.textContent = k;
      btn.id = `key-${k}`;
      btn.addEventListener('click', () => handleKey(k));
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function setMessage(msg) {
  document.getElementById('message').textContent = msg;
}

function handleKey(key) {
  if (gameOver) return;
  if (key === '⌫' || key === 'Backspace') {
    deleteLetter();
  } else if (key === 'ENTER' || key === 'Enter') {
    submitGuess();
  } else if (/^[A-Za-z]$/.test(key)) {
    addLetter(key.toUpperCase());
  }
}

function addLetter(letter) {
  if (currentCol >= 5) return;
  board[currentRow][currentCol] = letter;
  const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
  tile.textContent = letter;
  tile.classList.add('filled');
  currentCol++;
}

function deleteLetter() {
  if (currentCol <= 0) return;
  currentCol--;
  board[currentRow][currentCol] = '';
  const tile = document.getElementById(`tile-${currentRow}-${currentCol}`);
  tile.textContent = '';
  tile.classList.remove('filled');
}

function submitGuess() {
  if (currentCol < 5) {
    shakeRow(currentRow);
    setMessage('NOT ENOUGH LETTERS');
    setTimeout(() => setMessage(''), 1500);
    return;
  }

  const guess = board[currentRow].join('');
  const result = evaluate(guess);
  revealRow(currentRow, result, guess);
}

function evaluate(guess) {
  const result = Array(5).fill('absent');
  const targetArr = target.split('');
  const guessArr = guess.split('');
  const used = Array(5).fill(false);

  // Correct pass
  for (let i = 0; i < 5; i++) {
    if (guessArr[i] === targetArr[i]) {
      result[i] = 'correct';
      used[i] = true;
    }
  }
  // Present pass
  for (let i = 0; i < 5; i++) {
    if (result[i] === 'correct') continue;
    for (let j = 0; j < 5; j++) {
      if (!used[j] && guessArr[i] === targetArr[j]) {
        result[i] = 'present';
        used[j] = true;
        break;
      }
    }
  }
  return result;
}

function revealRow(row, result, guess) {
  const delay = 300;
  result.forEach((state, i) => {
    setTimeout(() => {
      const tile = document.getElementById(`tile-${row}-${i}`);
      tile.classList.add('reveal');
      setTimeout(() => {
        tile.classList.remove('filled');
        tile.classList.add(state);
        updateKey(guess[i], state);
      }, 250);
    }, i * delay);
  });

  const totalDelay = 4 * delay + 500;
  setTimeout(() => {
    const won = result.every(s => s === 'correct');
    if (won) {
      bounceRow(row);
      setTimeout(() => showModal(true, row + 1), 600);
      gameOver = true;
    } else {
      currentRow++;
      currentCol = 0;
      if (currentRow >= 6) {
        setTimeout(() => showModal(false, 6), 300);
        gameOver = true;
      }
    }
  }, totalDelay);
}

function updateKey(letter, state) {
  const priority = { correct: 3, present: 2, absent: 1 };
  const current = keyStates[letter];
  if (!current || priority[state] > priority[current]) {
    keyStates[letter] = state;
    const key = document.getElementById(`key-${letter}`);
    if (key) {
      key.classList.remove('correct','present','absent');
      key.classList.add(state);
    }
  }
}

function shakeRow(row) {
  document.querySelectorAll(`#row-${row} .tile`).forEach(t => {
    t.classList.add('shake');
    t.addEventListener('animationend', () => t.classList.remove('shake'), {once:true});
  });
}

function bounceRow(row) {
  document.querySelectorAll(`#row-${row} .tile`).forEach((t, i) => {
    setTimeout(() => {
      t.classList.add('bounce');
      t.addEventListener('animationend', () => t.classList.remove('bounce'), {once:true});
    }, i * 80);
  });
}

function showModal(won, attempts) {
  const winEmojis = ['🎉','😏','🙌','😂','🤩','👏','😎'];
  document.getElementById('modal-emoji').textContent = won
    ? winEmojis[Math.floor(Math.random()*winEmojis.length)]
    : '💩';
  document.getElementById('modal-title').textContent = won ? 'GOT IT!' : 'UNLUCKY';
  document.getElementById('modal-answer').textContent = target;
  document.getElementById('modal-attempts').textContent = won
    ? `solved in ${attempts} attempt${attempts===1?'':'s'}`
    : 'better luck next time';
  document.getElementById('modal').classList.add('show');
}

document.addEventListener('keydown', e => handleKey(e.key));

newGame();
</script>
</body>
</html>
